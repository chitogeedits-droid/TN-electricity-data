name: Daily Electricity Report Archiver

on:
  schedule:
    # 12:30 PM UTC is 6:00 PM IST
    - cron: '30 12 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape-and-archive:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # caching pip dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install and Start Tor
        run: |
          sudo apt-get update
          sudo apt-get install -y tor
          sudo systemctl start tor
          # Wait a few seconds for Tor to establish circuits
          sleep 10
          # Verify Tor is running on port 9050
          curl --socks5-hostname 127.0.0.1:9050 -s https://check.torproject.org/api/ip

      - name: Run Scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          USE_TOR: 'true'
        run: |
          python scraper.py
